<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog CEPI</title>
    <link href="css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.14.2/themes/base/jquery-ui.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>

<body class="custom-text">
    <nav class="navbar navbar-expand-lg ">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="images/logo.png" alt="Logo" width="70">
            </a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse " id="menu">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0 ">
                    <li class="nav-item ms-5 me-5"><a class="nav-link custom-title" href="blog.html">Menu1</a></li>
                    <li class="nav-item ms-5 me-5"><a class="nav-link custom-title" href="#">Menu2</a></li>
                    <li class="nav-item ms-5 me-5"><a class="nav-link custom-title" href="#">Menu3</a></li>
                    <li class="nav-item ms-5 me-5"><a class="nav-link custom-title" href="#">Menu4</a></li>
                </ul>

                <img src="images/profil.png" alt="Profil" width="60" class="rounded-circle">
            </div>
        </div>
    </nav>
    <div class="container d-flex justify-content-center">
        <form  id="publicationForm" class="col-6 custom-text">
            <h2 class="mb-4 custom-title" >Nouvelle publication</h2>
            <div class="form-group">
              <label for="titre">Titre</label>
              <input type="text" class="form-control" id="titre" name="titre">
            </div>
            <div class="form-group">
                <label for="auteur">Auteur(e)</label>
                <input type="text" class="form-control" id="auteur" name="auteur">
            </div>
            <div class="form-group">
                <label for="date">Date de publication</label>
                <input type="date" class="form-control" id="date"   name="date" >
            </div>
            <div class="form-group">
              <label for="contenu">Contenu</label>
              <textarea class="form-control" id="contenu"  name="contenu" rows="5"></textarea>
            </div>
            <div class="justify-content-center d-flex form-group ">
                <button type="submit" class="btn btn-primary " id="envoyerForm" >Envoyer</button>
              </div>
          </form>
    </div>

    <!-- Boîte de dialogue de confirmation (en dehors du formulaire) -->
    <div id="confirmDialog" title="Confirmer l'envoi" style="display:none;">
        <p>Êtes-vous sûr de vouloir publier cet article ?</p>
    </div>

    <footer class="text-center my-5">
        <div class="d-flex justify-content-center gap-3 mb-2">
            <img src="images/facebook.png" width="20">
            <img src="images/twitter.png" width="20">
            <img src="images/linkedIn.png" width="20">
        </div>
        <p class="mb-0" style="font-family: 'Lora', serif;">Centre d’Expertise et de Perfectionnement en Informatique</p>
        <small style="font-family: 'Open Sans', sans-serif;">2022</small>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/ui/1.14.2/jquery-ui.min.js" integrity="sha256-mblSWfbYzaq/f+4akyMhE6XELCou4jbkgPv+JQPER2M=" crossorigin="anonymous"></script>
    <script src="./JavaScript/form.js"></script>
</body>

</html>
